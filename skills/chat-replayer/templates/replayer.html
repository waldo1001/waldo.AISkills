<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Replay</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1f2937;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --user: #58a6ff;
    --assistant: #3fb950;
    --tool: #d29922;
    --tool-bg: rgba(210, 153, 34, 0.08);
    --tool-mcp: #a371f7;
    --tool-mcp-bg: rgba(163, 113, 247, 0.1);
    --code-bg: #010409;
    --kw: #ff7b72;
    --str: #a5d6ff;
    --num: #79c0ff;
    --com: #8b949e;
    --fn: #d2a8ff;
  }
  body.light {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --surface-2: #eaeef2;
    --border: #d0d7de;
    --text: #1f2328;
    --text-muted: #59636e;
    --user: #0969da;
    --assistant: #1a7f37;
    --tool: #9a6700;
    --tool-bg: rgba(154, 103, 0, 0.06);
    --tool-mcp: #8250df;
    --tool-mcp-bg: rgba(130, 80, 223, 0.06);
    --code-bg: #f6f8fa;
    --kw: #cf222e;
    --str: #0a3069;
    --num: #0550ae;
    --com: #6e7781;
    --fn: #8250df;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header .title { font-size: 18px; font-weight: 600; }
  header .agent { color: var(--text-muted); font-size: 14px; margin-top: 2px; }
  header .meta-right { color: var(--text-muted); font-size: 13px; text-align: right; }
  .usage-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 8px;
    white-space: nowrap;
    cursor: default;
    transition: background 0.15s;
  }
  .usage-pill:hover { background: var(--surface); }
  .usage-pill .credits { color: var(--tool-mcp); font-weight: 700; }
  .step-user { position: relative; }
  .step-user .usage-pill {
    position: absolute;
    bottom: -18px;
    right: 0;
    font-size: 10.5px;
  }
  .header-usage {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    border-left: 1px solid var(--border);
    padding-left: 12px;
    margin-left: 4px;
  }
  .header-usage .credits { color: var(--tool-mcp); font-weight: 700; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    scroll-behavior: smooth;
  }
  .chat {
    max-width: 980px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .step {
    animation: appear 240ms ease-out;
  }
  @keyframes appear {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* User bubble */
  .step-user {
    display: flex;
    justify-content: flex-end;
  }
  .step-user .bubble {
    background: var(--user);
    color: white;
    padding: 14px 20px;
    border-radius: 18px 18px 4px 18px;
    max-width: 75%;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 16px;
  }
  body.light .step-user .bubble { color: white; }
  /* Role label (shown once before first assistant block in a group) */
  .role-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  /* Text block (assistant markdown) */
  .text-block {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    border-radius: 4px 18px 18px 18px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  /* Markdown inside text blocks */
  .text-block h1, .text-block h2, .text-block h3, .text-block h4 {
    margin: 0.6em 0 0.3em 0;
    line-height: 1.3;
  }
  .text-block h1 { font-size: 1.3em; }
  .text-block h2 { font-size: 1.15em; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .text-block h3 { font-size: 1.05em; }
  .text-block h4 { font-size: 1em; }
  .text-block p { margin: 0.5em 0; }
  .text-block ul, .text-block ol { margin: 0.4em 0; padding-left: 1.6em; }
  .text-block li { margin: 0.15em 0; }
  .text-block strong { color: var(--text); }
  .text-block code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.88em;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
  }
  .text-block pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 0.5em 0;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre;
    color: var(--text);
  }
  .text-block pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }
  .text-block table {
    border-collapse: collapse;
    width: 100%;
    margin: 0.5em 0;
    font-size: 0.9em;
  }
  .text-block th, .text-block td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
  }
  .text-block th {
    background: var(--surface-2);
    font-weight: 600;
  }
  .text-block blockquote {
    border-left: 3px solid var(--border);
    margin: 0.5em 0;
    padding: 0.3em 0 0.3em 14px;
    color: var(--text-muted);
  }
  .text-block hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1em 0;
  }
  /* Tool wrapper — one collapsible unit per tool call+result */
  .tool-wrap {
    background: var(--tool-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--tool);
    border-radius: 8px;
    overflow: hidden;
  }
  .tool-wrap.tool-mcp {
    background: var(--tool-mcp-bg);
    border-left: 5px solid var(--tool-mcp);
    border-color: rgba(163, 113, 247, 0.35);
    box-shadow: 0 0 0 1px rgba(163, 113, 247, 0.15), 0 2px 8px rgba(163, 113, 247, 0.12);
  }
  body.light .tool-wrap.tool-mcp {
    border-color: rgba(130, 80, 223, 0.3);
    box-shadow: 0 0 0 1px rgba(130, 80, 223, 0.12), 0 2px 8px rgba(130, 80, 223, 0.08);
  }
  .tool-wrap.tool-mcp .tool-icon { color: var(--tool-mcp); }
  .tool-wrap.tool-mcp .tool-name {
    background: var(--tool-mcp);
    border-color: var(--tool-mcp);
  }
  .tool-service {
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--tool-mcp);
    background: var(--tool-mcp-bg);
    border: 1px solid var(--tool-mcp);
    border-radius: 4px;
    padding: 2px 6px;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    white-space: nowrap;
    opacity: 0.85;
  }
  body.light .tool-service {
    opacity: 1;
  }
  .tool-wrap.tool-muted {
    opacity: 0.6;
    border-left-width: 2px;
  }
  .tool-wrap.tool-muted .tool-name {
    font-weight: 600;
    font-size: 12px;
    background: var(--surface-2);
    border-color: var(--border);
    color: var(--text-muted);
    text-shadow: none;
  }
  .tool-summary {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
  }
  .tool-summary:hover { background: rgba(255,255,255,0.03); }
  body.light .tool-summary:hover { background: rgba(0,0,0,0.03); }
  .tool-icon { font-size: 18px; color: var(--tool); }
  .tool-service {
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-weight: 800;
    color: #fff;
    font-size: 13px;
    background: #6f42c1;
    border: 1px solid #6f42c1;
    border-radius: 5px 0 0 5px;
    padding: 3px 8px 3px 12px;
    letter-spacing: 0.02em;
    text-shadow: 0 1px 1px rgba(0,0,0,0.3);
  }
  body.light .tool-service {
    background: #8250df;
    border-color: #8250df;
    color: #fff;
  }
  .tool-service + .tool-name {
    border-radius: 0 5px 5px 0;
    margin-left: -1px;
  }
  .tool-name {
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-weight: 800;
    color: #fff;
    font-size: 13px;
    background: var(--tool);
    border: 1px solid var(--tool);
    border-radius: 5px;
    padding: 3px 12px;
    letter-spacing: 0.02em;
    text-shadow: 0 1px 1px rgba(0,0,0,0.3);
  }
  body.light .tool-name {
    color: #fff;
    background: var(--tool);
    border-color: var(--tool);
    text-shadow: 0 1px 1px rgba(0,0,0,0.2);
  }
  .tool-desc {
    color: var(--text-muted);
    font-size: 13px;
    flex: 0 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .tool-toggle { margin-left: auto; }
  .tool-toggle {
    color: var(--text-muted);
    font-size: 11px;
    transition: transform 200ms;
  }
  .tool-wrap.collapsed .tool-toggle { transform: rotate(-90deg); }
  .tool-details {
    padding: 0 16px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tool-wrap .tool-details-anim {
    max-height: 3000px;
    overflow: hidden;
    opacity: 1;
    transition: max-height 320ms ease, opacity 220ms ease;
  }
  .tool-wrap.collapsed .tool-details-anim {
    max-height: 0;
    opacity: 0;
  }
  .tool-result-preview {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 340px;
  }
  .tool-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .tool-input pre, .tool-result pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 0;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre;
    color: var(--text);
  }
  .tool-input .field-label {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    margin: 8px 0 4px 0;
    text-transform: lowercase;
  }
  .tool-input .field-label:first-child { margin-top: 0; }
  .tool-result {
    border-left: 3px solid var(--assistant);
    padding-left: 12px;
  }
  .result-text {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: 12px 14px;
    border-radius: 6px;
    max-height: 500px;
    overflow-y: auto;
  }
  /* Syntax highlighting */
  .tok-kw { color: var(--kw); font-weight: 600; }
  .tok-str { color: var(--str); }
  .tok-num { color: var(--num); }
  .tok-com { color: var(--com); font-style: italic; }
  .tok-fn { color: var(--fn); }
  /* Footer controls */
  footer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .controls { display: flex; gap: 8px; align-items: center; }
  button {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 120ms;
  }
  button:hover { background: var(--border); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--user); color: white; border-color: var(--user); }
  .counter {
    color: var(--text-muted);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    min-width: 80px;
    text-align: center;
  }
  .progress {
    flex: 1; height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden; max-width: 300px; cursor: pointer;
  }
  .progress-bar { height: 100%; background: var(--user); transition: width 200ms; }
  .hint { color: var(--text-muted); font-size: 12px; }
  .empty { color: var(--text-muted); text-align: center; margin-top: 80px; font-size: 15px; }
  .empty .drop-zone {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 60px 40px; margin-top: 24px; max-width: 500px; margin-left: auto; margin-right: auto;
  }
  .empty .drop-zone.dragover { border-color: var(--user); background: var(--surface); }
  /* ── Animation additions ─────────────────────────────────────────────── */
  .thinking-dots {
    display: inline-flex; gap: 5px; padding: 4px 2px; align-items: center;
  }
  .thinking-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    animation: dot-pulse 900ms ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 150ms; }
  .thinking-dots span:nth-child(3) { animation-delay: 300ms; }
  @keyframes dot-pulse {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.75); }
    40% { opacity: 1; transform: scale(1); }
  }
  .speed-controls { display: inline-flex; gap: 4px; margin-right: 6px; }
  .speed-btn {
    padding: 6px 10px;
    font-size: 12px;
    min-width: 34px;
  }
  .speed-btn.active {
    background: var(--user);
    color: white;
    border-color: var(--user);
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="title" id="title">Chat Replay</div>
    <div class="agent" id="agent"></div>
  </div>
  <div class="meta-right" id="meta-right"></div>
</header>

<main id="main">
  <div class="chat" id="chat"></div>
  <div class="empty" id="empty" style="display:none;">
    <div>No transcript loaded.</div>
    <div class="drop-zone" id="drop-zone">
      Drop a transcript JSON file here<br>
      <span class="hint">or use ?src=path.json in the URL</span>
    </div>
  </div>
</main>

<footer>
  <div class="controls">
    <button id="btn-reset" title="Reset (Home)">⏮</button>
    <button id="btn-prev" title="Previous (←)">←</button>
    <button id="btn-play" class="primary" title="Auto-play (P)">▶ Play</button>
    <button id="btn-next" title="Next step (→)">→</button>
    <button id="btn-end" title="Reveal all (End)">⏭</button>
  </div>
  <div class="counter" id="counter">0 / 0</div>
  <div class="progress" id="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  <div class="controls">
    <button id="btn-theme" title="Toggle theme">☾</button>
    <span class="hint">Space ▸ play response · → ▸ next step · P ▸ auto-play all</span>
  </div>
</footer>

<script type="application/json" id="transcript-data">"__TRANSCRIPT_JSON__"</script>

<script>
(function() {
  // ── State ──────────────────────────────────────────────────────────────────
  let transcript = null;
  let steps = [];         // flattened reveal steps
  let visibleSteps = 0;
  let playing = false;
  let playTimer = null;
  // Speed: 1 = 1×, 2 = 2×, 4 = 4×, 0 = instant (no animation)
  let SPEED = 4;  // default playback speed: 4x
  const isInstant = () => SPEED === 0;
  const speedMul = () => (SPEED === 0 ? 1 : SPEED);

  // ── Typewriter ──────────────────────────────────────────────────────────
  // Progressively reveal all text nodes inside `el` while preserving its
  // rendered HTML structure (headings, lists, <code>, <pre>, links, tables).
  function typewriteElement(el, slowFactor) {
    if (!el || isInstant()) return Promise.resolve();
    const slow = slowFactor || 1;
    const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
    const nodes = [];
    let total = 0;
    while (walker.nextNode()) {
      const n = walker.currentNode;
      const full = n.nodeValue;
      if (!full) continue;
      nodes.push({ node: n, full, len: full.length });
      total += full.length;
    }
    if (total === 0) return Promise.resolve();
    for (const n of nodes) n.node.nodeValue = '';
    const BASE_MS_PER_CHAR = 6;
    const MIN_MS = 150;
    const MAX_MS = 600;
    const duration = (Math.max(MIN_MS, Math.min(MAX_MS, total * BASE_MS_PER_CHAR)) * slow) / speedMul();
    return new Promise(resolve => {
      const start = performance.now();
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(1, elapsed / duration);
        let remaining = Math.floor(progress * total);
        for (const n of nodes) {
          if (remaining >= n.len) { n.node.nodeValue = n.full; remaining -= n.len; }
          else if (remaining > 0) { n.node.nodeValue = n.full.slice(0, remaining); remaining = 0; }
          else { n.node.nodeValue = ''; }
        }
        scrollToBottom();
        if (progress >= 1) {
          for (const n of nodes) n.node.nodeValue = n.full;
          resolve();
        } else {
          requestAnimationFrame(tick);
        }
      }
      requestAnimationFrame(tick);
    });
  }

  // Delay between steps during Play. Short within an assistant turn,
  // longer between turns; zero when instant.
  function stepDelay(cur, nxt) {
    if (isInstant() || !nxt) return 0;
    if (!cur) return 0; // no leading delay before the very first reveal
    const mul = speedMul();
    if (cur && cur.type === 'label') return 350 / mul;          // thinking beat
    if (cur && cur.type === 'text' && nxt.type === 'text') return 400 / mul;
    if (nxt.type === 'user') return 1400 / mul;
    if (cur && cur.type === 'user') return 700 / mul;
    return 900 / mul;
  }

  const $ = id => document.getElementById(id);
  const chatEl = $('chat');
  const emptyEl = $('empty');
  const dropZone = $('drop-zone');

  // ── Markdown renderer (self-contained, no deps) ───────────────────────────
  function renderMarkdown(src) {
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // Fenced code blocks first
    const codeBlocks = [];
    src = src.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      const i = codeBlocks.length;
      codeBlocks.push(`<pre><code>${highlightCode(code.replace(/\n$/, ''), lang)}</code></pre>`);
      return `\x00CB${i}\x00`;
    });

    // Split into lines
    const lines = src.split('\n');
    let html = '';
    let inList = false;
    let inTable = false;
    let tableHeaderDone = false;

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];

      // Code block placeholder
      const cbMatch = line.match(/^\x00CB(\d+)\x00$/);
      if (cbMatch) {
        if (inList) { html += '</ul>'; inList = false; }
        if (inTable) { html += '</tbody></table>'; inTable = false; }
        html += codeBlocks[parseInt(cbMatch[1])];
        continue;
      }

      // Table row
      if (line.match(/^\|(.+)\|$/)) {
        if (inList) { html += '</ul>'; inList = false; }
        // Check if next line is separator
        const nextLine = lines[i + 1] || '';
        if (!inTable) {
          html += '<table>';
          inTable = true;
          tableHeaderDone = false;
          // This is the header row
          const cells = line.split('|').filter(c => c !== '').map(c => `<th>${inlineMarkdown(esc(c.trim()))}</th>`).join('');
          html += `<thead><tr>${cells}</tr></thead>`;
          // Skip separator line if present
          if (nextLine.match(/^\|[\s:|-]+\|$/)) { i++; }
          html += '<tbody>';
          tableHeaderDone = true;
          continue;
        }
        // Separator line (skip if we already started tbody)
        if (line.match(/^\|[\s:|-]+\|$/)) continue;
        // Data row
        const cells = line.split('|').filter(c => c !== '').map(c => `<td>${inlineMarkdown(esc(c.trim()))}</td>`).join('');
        html += `<tr>${cells}</tr>`;
        continue;
      } else if (inTable) {
        html += '</tbody></table>';
        inTable = false;
      }

      // Heading
      const hMatch = line.match(/^(#{1,4})\s+(.+)$/);
      if (hMatch) {
        if (inList) { html += '</ul>'; inList = false; }
        const level = hMatch[1].length;
        html += `<h${level}>${inlineMarkdown(esc(hMatch[2]))}</h${level}>`;
        continue;
      }

      // HR
      if (line.match(/^[-*_]{3,}$/)) {
        if (inList) { html += '</ul>'; inList = false; }
        html += '<hr>';
        continue;
      }

      // Blockquote
      if (line.match(/^>\s?/)) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<blockquote>${inlineMarkdown(esc(line.replace(/^>\s?/, '')))}</blockquote>`;
        continue;
      }

      // Unordered list
      if (line.match(/^[-*+]\s+/)) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${inlineMarkdown(esc(line.replace(/^[-*+]\s+/, '')))}</li>`;
        continue;
      }

      // Ordered list
      if (line.match(/^\d+\.\s+/)) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${inlineMarkdown(esc(line.replace(/^\d+\.\s+/, '')))}</li>`;
        continue;
      }

      // Close list if we got here
      if (inList) { html += '</ul>'; inList = false; }

      // Empty line
      if (line.trim() === '') {
        continue;
      }

      // Paragraph
      html += `<p>${inlineMarkdown(esc(line))}</p>`;
    }

    if (inList) html += '</ul>';
    if (inTable) html += '</tbody></table>';
    return html;
  }

  function inlineMarkdown(s) {
    // Bold + italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // Bold
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Inline code
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Links
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }

  // ── Syntax highlighting ────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function highlightCode(code, lang) {
    let s = escapeHtml(code);
    lang = (lang || '').toLowerCase();
    if (lang === 'json') {
      s = s.replace(/("(?:[^"\\]|\\.)*")(\s*:)?/g, (_, str, colon) =>
        colon ? `<span class="tok-fn">${str}</span>${colon}` : `<span class="tok-str">${str}</span>`)
        .replace(/\b(true|false|null)\b/g, '<span class="tok-kw">$1</span>')
        .replace(/(?<![\w-])(-?\d+(?:\.\d+)?)/g, '<span class="tok-num">$1</span>');
      return s;
    }
    // KQL / SQL
    const kw = ['select','from','where','and','or','not','order','by','asc','desc','top',
      'distinct','group','having','join','inner','left','right','full','outer','on','as',
      'case','when','then','else','end','union','project','extend','summarize','count',
      'sum','avg','min','max','let','take','limit','make-list','make-set','bin','ago',
      'datetime','between','startswith','endswith','contains','in','tostring','toint',
      'toreal','todatetime','totimespan','strlen','strcat','parse_json','dynamic',
      'mv-expand','getschema','print','render','sort','top-nested','percentile'];
    s = s.replace(/(--[^\n]*|\/\/[^\n]*)/g, '<span class="tok-com">$1</span>')
      .replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*")/g, '<span class="tok-str">$1</span>')
      .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-num">$1</span>');
    const kwRe = new RegExp('\\b(' + kw.join('|') + ')\\b', 'gi');
    s = s.replace(kwRe, '<span class="tok-kw">$1</span>');
    return s;
  }

  function detectLang(key) {
    const k = (key || '').toLowerCase();
    if (k === 'kql' || k === 'sql' || k === 'query' || k === 'code') return 'kql';
    return null;
  }

  // ── Tool display helpers ───────────────────────────────────────────────────

  // Parse raw tool name into { service, op }
  // • copilot_readFile          → { service: null,           op: 'read_file' }
  // • mcp_bc-code-intel_ask_bc_expert → { service: 'bc-code-intel', op: 'ask_bc_expert' }
  // • run_in_terminal           → { service: null,           op: 'terminal' }
  function parseTool(raw) {
    const copilotMap = {
      listDirectory: 'list_dir', readFile: 'read_file', findFiles: 'find_files',
      findTextInFiles: 'find_in_files', grep: 'grep', searchWorkspace: 'search',
      createFile: 'create_file', replaceString: 'replace_string', multiReplaceString: 'multi_replace',
      insertEdit: 'insert_edit', applyPatch: 'apply_patch', editFile: 'edit_file',
      getErrors: 'get_errors',
    };
    const directMap = {
      run_in_terminal: 'terminal', terminal_last_command: 'terminal_last',
      fetch_webpage: 'fetch', semantic_search: 'semantic_search',
      file_search: 'file_search', grep_search: 'grep_search',
      get_errors: 'get_errors', get_changed_files: 'git_diff',
      al_getdiagnostics: 'al_diagnostics', al_build: 'al_build',
      al_publish: 'al_publish', al_downloadsymbols: 'al_symbols',
      vscode_askQuestions: 'ask_user', vscode_renameSymbol: 'rename_symbol',
      vscode_listCodeUsages: 'find_usages',
      vscode_fetchWebPage_internal: 'fetch_webpage',
    };

    // MCP tool: mcp_<server-name>_<operation> where server-name may contain hyphens
    const mcpM = (raw || '').match(/^mcp_([a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)_(.+)$/i);
    if (mcpM) {
      // Distinguish server from op: server is the shortest known-server prefix
      // Strategy: try splitting after 1, 2 … segments until we find a known MCP server pattern
      // Known compound server names (hyphenated):
      const knownServers = ['bc-code-intel','al-mcp-server','mcp-server-at','mcp-server-at2',
                            'ifacto-token','microsoft-lea'];
      const rest = raw.slice('mcp_'.length);
      for (const srv of knownServers) {
        if (rest.startsWith(srv + '_')) {
          return { service: srv, op: rest.slice(srv.length + 1) };
        }
      }
      // Fallback: first underscore-delimited segment is server
      const firstUs = rest.indexOf('_');
      if (firstUs > 0) return { service: rest.slice(0, firstUs), op: rest.slice(firstUs + 1) };
      return { service: null, op: rest };
    }

    // copilot_ prefix
    if ((raw || '').startsWith('copilot_')) {
      const bare = raw.slice('copilot_'.length);
      return { service: null, op: copilotMap[bare] || bare };
    }

    return { service: null, op: directMap[raw] || raw || 'tool' };
  }

  function friendlyToolName(raw) {
    const { service, op } = parseTool(raw);
    return service ? `${service} · ${op}` : op;
  }

  function toolIcon(raw) {
    const n = (raw || '').toLowerCase();
    if (/bc-code-intel/.test(n))  return '🧠';
    if (/al-mcp|al_/.test(n))     return '⚙️';
    if (/jira/.test(n))           return '📋';
    if (/conf_/.test(n))          return '📘';
    if (/microsoft-lea/.test(n))  return '📖';
    if (/ifacto-token/.test(n))   return '🪙';
    if (/listdir|listdirectory|findfiles|createfile|readfile|replacest|multireplace|insertedit|editfile|applypatch|findtextinfiles/.test(n)) return '📄';
    if (/grep|search|semantic/.test(n)) return '🔍';
    if (/terminal|run_in/.test(n)) return '💻';
    if (/fetch|http|webpage/.test(n)) return '🌐';
    if (/git|changed/.test(n))    return '🔀';
    if (/ask_user|askquestion/.test(n)) return '❓';
    if (/error|diagnos/.test(n))  return '🚨';
    if (/memory/.test(n))         return '🗒️';
    return '🔧';
  }

  // Auto-generate a short description from tool inputs when none was provided
  function autoDesc(name, input) {
    if (!input) return '';
    const n = (name || '').toLowerCase();
    const shorten = p => {
      if (!p) return '';
      const s = String(p);
      const parts = s.replace(/\\/g, '/').split('/').filter(Boolean);
      return parts.length > 2 ? '…/' + parts.slice(-2).join('/') : s;
    };
    // MCP: bc-code-intel
    if (/bc-code-intel/.test(n)) {
      return (input.question || input.query || input.topic || input.code_context || '').substring(0, 70);
    }
    // MCP: Jira
    if (/jira/.test(n)) {
      return (input.issueKey || input.issue_key || input.path || '').substring(0, 40);
    }
    // File operations
    if (/listdir|listdirectory/.test(n)) return shorten(input.path || input.dirPath || input.directory);
    if (/readfile/.test(n))  return shorten(input.filePath || input.file || input.path);
    if (/findfiles|findtextinfiles/.test(n)) return `"${(input.query || input.pattern || input.glob || '').substring(0, 40)}"`;
    if (/grep/.test(n))      return `"${(input.query || input.pattern || '').substring(0, 40)}"`;
    if (/searchworkspace|semantic_search|file_search|grep_search/.test(n))
      return `"${(input.query || '').substring(0, 50)}"`;
    if (/terminal|run_in/.test(n)) return (input.explanation || input.command || '').substring(0, 60);
    if (/replacest|multireplace|insertedit|editfile|applypatch/.test(n))
      return shorten(input.filePath || input.file || '');
    if (/createfile/.test(n)) return shorten(input.filePath || input.file || '');
    if (/fetch|webpage/.test(n)) {
      const urls = input.urls;
      if (Array.isArray(urls) && urls.length) return urls[0].replace(/^https?:\/\//, '').substring(0, 50);
      return (input.url || '').replace(/^https?:\/\//, '').substring(0, 50);
    }
    return '';
  }

  // ── Flatten transcript into steps ──────────────────────────────────────────
  // Each step is one unit revealed per →. Types:
  //   { type: 'user',   content }
  //   { type: 'label' }                              — "Assistant" role label
  //   { type: 'text',   content }                     — assistant markdown
  //   { type: 'tool',   name, input, result }         — call + result in one step
  function flattenTranscript(t) {
    if (!t || !t.turns) return [];
    const flat = [];
    // Build a map of tool results by toolUseId
    const resultMap = {};
    for (const turn of t.turns) {
      if (turn.role === 'tool' && turn.toolUseId) {
        resultMap[turn.toolUseId] = turn;
      }
    }

    function hasInput(input) {
      if (!input) return false;
      if (typeof input !== 'object') return String(input).trim().length > 0;
      return Object.keys(input).length > 0;
    }
    function isEmptyText(s) {
      const t = (s || '').trim().toLowerCase();
      return t.length === 0 || t === '(no output)' || t === 'no output';
    }
    function hasResult(result) {
      if (!result) return false;
      const content = result.content || [];
      return content.some(c => c.type === 'text' && !isEmptyText(c.content));
    }

    let lastRole = null;
    for (const turn of t.turns) {
      if (turn.role === 'user') {
        flat.push({ type: 'user', content: turn.content || '' });
        lastRole = 'user';
      } else if (turn.role === 'assistant') {
        if (lastRole !== 'assistant') {
          flat.push({ type: 'label' });
        }
        for (const block of (turn.blocks || [])) {
          if (block.type === 'text') {
            flat.push({ type: 'text', content: block.content || '' });
          } else if (block.type === 'tool_use') {
            const result = resultMap[block.id] || null;
            // Skip tools with no input AND no output
            if (!hasInput(block.input) && !hasResult(result)) continue;
            // Extract description for summary display
            const desc = block.input?.description || block.input?.explanation || block.input?.goal || '';
            flat.push({
              type: 'tool',
              name: block.name,
              description: desc,
              input: block.input,
              result: result
            });
          }
        }
        lastRole = 'assistant';
      }
    }
    return flat;
  }

  // ── Render a single step to DOM ────────────────────────────────────────────
  function renderStep(step) {
    const div = document.createElement('div');
    div.className = 'step';

    if (step.type === 'user') {
      div.classList.add('step-user');
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = step.content;
      div.appendChild(b);
      // Usage pill (shown below the bubble)
      if (step.usage) {
        const u = step.usage;
        const pill = document.createElement('div');
        pill.className = 'usage-pill';
        const parts = [];
        if (u.promptTokens) parts.push(`↑${u.promptTokens.toLocaleString()}`);
        if (u.outputTokens) parts.push(`↓${u.outputTokens.toLocaleString()}`);
        let html = parts.join(' ');
        if (u.credits != null) {
          html += ` <span class="credits" title="Copilot credits used">${u.credits.toFixed(1)} cr</span>`;
        }
        pill.innerHTML = html;
        pill.title = [
          u.promptTokens ? `Input: ${u.promptTokens.toLocaleString()} tokens` : '',
          u.outputTokens ? `Output: ${u.outputTokens.toLocaleString()} tokens` : '',
          u.credits != null ? `Credits used: ${u.credits.toFixed(3)}` : '',
        ].filter(Boolean).join('\n');
        div.appendChild(pill);
        div.style.paddingBottom = '22px';
      }
      return div;
    }

    if (step.type === 'label') {
      const lbl = document.createElement('div');
      lbl.className = 'role-label';
      lbl.textContent = transcript.meta?.agent || 'Assistant';
      div.appendChild(lbl);
      return div;
    }

    if (step.type === 'text') {
      const t = document.createElement('div');
      t.className = 'text-block';
      t.innerHTML = renderMarkdown(step.content);
      div.appendChild(t);
      return div;
    }

    if (step.type === 'tool') {
      const wrap = document.createElement('div');

      // Classify tool importance
      const tn = (step.name || '').toLowerCase();
      const isMcp = /^mcp_/.test(tn) || /^al_/.test(tn) || /run_in_terminal/.test(tn);
      const isRealMcp = /^mcp_/.test(tn);  // true MCP-protocol tools — expanded + full details by default
      const isMuted = /^copilot_(readfile|listdirectory|findfiles|findtextinfiles|getworkspacestructure|getnotebooksummary)$/.test(tn.replace(/[^a-z_]/g,''))
        || /^vscode_fetchwebpage/.test(tn.replace(/[^a-z_]/g,''));
      // All tools start collapsed
      wrap.className = 'tool-wrap collapsed';
      if (isRealMcp || isMcp) wrap.classList.add('tool-mcp');
      else if (isMuted) wrap.classList.add('tool-muted');

      // Summary header: icon + name + description + first-line of result
      const desc = step.description || '';
      let resultPreview = '';
      if (step.result) {
        const firstText = (step.result.content || []).find(c => c.type === 'text' && (c.content || '').trim());
        if (firstText) {
          const firstLine = String(firstText.content).split('\n').find(l => l.trim()) || '';
          if (firstLine) {
            resultPreview = `<span class="tool-result-preview">[${escapeHtml(firstLine.trim())}]</span>`;
          }
        }
      }
      const { service, op } = parseTool(step.name);
      const icon = toolIcon(step.name);
      const effectiveDesc = desc || autoDesc(step.name, step.input);
      const serviceHtml = service
        ? `<span class="tool-service">${escapeHtml(service)}</span><span class="tool-name">${escapeHtml(op)}</span>`
        : `<span class="tool-name">${escapeHtml(op)}</span>`;
      const summaryHtml = `
        <div class="tool-summary">
          <span class="tool-icon">${icon}</span>
          ${serviceHtml}
          ${effectiveDesc ? `<span class="tool-desc">— ${escapeHtml(effectiveDesc)}</span>` : ''}
          ${resultPreview}
          <span class="tool-toggle">▼</span>
        </div>
      `;
      wrap.innerHTML = summaryHtml;
      wrap.querySelector('.tool-summary').addEventListener('click', () => {
        const anim = wrap.querySelector('.tool-details-anim');
        if (!anim) { wrap.classList.toggle('collapsed'); return; }
        const collapsing = !wrap.classList.contains('collapsed');
        if (collapsing) {
          anim.style.maxHeight = anim.scrollHeight + 'px';
          requestAnimationFrame(() => {
            wrap.classList.add('collapsed');
            anim.style.maxHeight = '0px';
          });
        } else {
          wrap.classList.remove('collapsed');
          const target = anim.scrollHeight;
          anim.style.maxHeight = '0px';
          requestAnimationFrame(() => { anim.style.maxHeight = target + 'px'; });
          const onEnd = (e) => {
            if (e.propertyName !== 'max-height') return;
            anim.style.maxHeight = 'none';
            anim.removeEventListener('transitionend', onEnd);
          };
          anim.addEventListener('transitionend', onEnd);
        }
      });

      // Details container (animated collapse via max-height)
      const detailsAnim = document.createElement('div');
      detailsAnim.className = 'tool-details-anim';
      const details = document.createElement('div');
      details.className = 'tool-details';
      detailsAnim.appendChild(details);

      // Input section
      const inputKeys = step.input ? Object.keys(step.input) : [];
      // Filter out description/explanation from displayed input
      const displayInput = {};
      for (const k of inputKeys) {
        if (k !== 'description' && k !== 'explanation' && k !== 'goal') {
          displayInput[k] = step.input[k];
        }
      }
      if (Object.keys(displayInput).length > 0) {
        const inputDiv = document.createElement('div');
        inputDiv.className = 'tool-input';
        inputDiv.innerHTML = `<div class="tool-section-label">Input</div>` + renderToolInput(displayInput);
        details.appendChild(inputDiv);
      }

      // Result section
      if (step.result) {
        const resultContent = (step.result.content || []).map(c =>
          c.type === 'text' ? `<div class="result-text">${escapeHtml(c.content || '')}</div>` : ''
        ).join('');
        if (resultContent.trim()) {
          const resultDiv = document.createElement('div');
          resultDiv.className = 'tool-result';
          resultDiv.innerHTML = `<div class="tool-section-label">Result</div>` + resultContent;
          details.appendChild(resultDiv);
        }
      }

      wrap.appendChild(detailsAnim);
      div.appendChild(wrap);
      return div;
    }

    return div;
  }

  function renderToolInput(input) {
    if (!input || typeof input !== 'object') {
      return `<pre>${escapeHtml(String(input))}</pre>`;
    }
    const keys = Object.keys(input);
    if (keys.length === 1) {
      const k = keys[0];
      const v = input[k];
      const lang = detectLang(k);
      if (lang && typeof v === 'string') {
        return `<div class="field-label">${escapeHtml(k)}</div><pre>${highlightCode(v, lang)}</pre>`;
      }
    }
    let html = '';
    for (const k of keys) {
      const v = input[k];
      const lang = detectLang(k);
      html += `<div class="field-label">${escapeHtml(k)}</div>`;
      if (lang && typeof v === 'string') {
        html += `<pre>${highlightCode(v, lang)}</pre>`;
      } else if (typeof v === 'object') {
        html += `<pre>${highlightCode(JSON.stringify(v, null, 2), 'json')}</pre>`;
      } else {
        html += `<pre>${escapeHtml(String(v))}</pre>`;
      }
    }
    return html;
  }

  // ── Rendering ──────────────────────────────────────────────────────────────
  // Full rebuild — only used for setTranscript, reset, revealAll, and progress-bar jumps
  function fullRender() {
    if (!transcript || steps.length === 0) {
      emptyEl.style.display = 'block';
      chatEl.innerHTML = '';
      updateUI();
      return;
    }
    emptyEl.style.display = 'none';
    chatEl.innerHTML = '';
    for (let i = 0; i < visibleSteps; i++) {
      chatEl.appendChild(renderStep(steps[i]));
    }
    updateUI();
    scrollToBottom();
  }

  // Incremental: append one step. Returns a promise that resolves when any
  // typewriter/thinking animation for this step has finished.
  function appendStep() {
    emptyEl.style.display = 'none';
    const step = steps[visibleSteps - 1];
    const el = renderStep(step);
    chatEl.appendChild(el);
    updateUI();
    scrollToBottom();
    if (isInstant()) return Promise.resolve();
    if (step.type === 'user') {
      // User text types at half speed (twice the duration) for emphasis
      return typewriteElement(el.querySelector('.bubble'), 2);
    }
    if (step.type === 'text') {
      return typewriteElement(el.querySelector('.text-block'));
    }
    if (step.type === 'label') {
      const lbl = el.querySelector('.role-label');
      if (!lbl) return Promise.resolve();
      const dots = document.createElement('span');
      dots.className = 'thinking-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      dots.style.marginLeft = '8px';
      lbl.appendChild(dots);
      return new Promise(r => setTimeout(() => { dots.remove(); r(); }, 350 / speedMul()));
    }
    return Promise.resolve();
  }

  // Incremental: remove last step
  function removeLastStep() {
    const last = chatEl.lastElementChild;
    if (last) last.remove();
    updateUI();
    // Scroll to new last element
    const newLast = chatEl.lastElementChild;
    if (newLast) newLast.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      const last = chatEl.lastElementChild;
      if (last) last.scrollIntoView({ behavior: 'smooth', block: 'end' });
    });
  }

  function updateUI() {
    $('counter').textContent = `${visibleSteps} / ${steps.length}`;
    $('progress-bar').style.width = `${steps.length ? (visibleSteps / steps.length) * 100 : 0}%`;
    updateButtons();
  }

  function renderHeader() {
    if (!transcript) return;
    const m = transcript.meta || {};
    $('title').textContent = m.title || 'Chat Replay';
    document.title = m.title || 'Chat Replay';
    $('agent').textContent = m.agent || '';
    const right = [];
    if (m.model) right.push(m.model);
    if (m.source) right.push(m.source);
    const rightEl = $('meta-right');
    rightEl.textContent = right.join(' · ');
    // Session usage totals
    if (m.usage) {
      const u = m.usage;
      const usageEl = document.createElement('span');
      usageEl.className = 'header-usage';
      const parts = [];
      if (u.promptTokens) parts.push(`↑${u.promptTokens.toLocaleString()}`);
      if (u.outputTokens)  parts.push(`↓${u.outputTokens.toLocaleString()}`);
      let html = parts.join(' ');
      if (u.credits != null) html += ` <span class="credits" title="Total Copilot credits">${u.credits.toFixed(1)} cr</span>`;
      usageEl.innerHTML = html;
      usageEl.title = [
        u.promptTokens ? `Total input tokens: ${u.promptTokens.toLocaleString()}` : '',
        u.outputTokens ? `Total output tokens: ${u.outputTokens.toLocaleString()}` : '',
        u.credits != null ? `Total credits used: ${u.credits.toFixed(3)}` : '',
      ].filter(Boolean).join('\n');
      rightEl.appendChild(usageEl);
    }
  }

  function updateButtons() {
    $('btn-prev').disabled = visibleSteps <= 0;
    $('btn-next').disabled = visibleSteps >= steps.length;
    $('btn-reset').disabled = visibleSteps === 0;
    $('btn-end').disabled = visibleSteps >= steps.length;
    $('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  function setTranscript(t) {
    transcript = t;
    steps = flattenTranscript(t);
    // Start empty so Play animates from the very first message
    visibleSteps = 0;
    renderHeader();
    fullRender();
  }

  function next() {
    if (visibleSteps < steps.length) { visibleSteps++; return appendStep(); }
    stopPlay();
    return Promise.resolve();
  }
  function prev() {
    if (visibleSteps > 0) { visibleSteps--; removeLastStep(); }
  }
  function reset() {
    stopPlay();
    visibleSteps = 0;
    fullRender();
  }
  function revealAll() {
    visibleSteps = steps.length;
    fullRender();
  }
  async function playUntilNextUser() {
    if (visibleSteps >= steps.length) return;
    // If we're sitting on a user step, reveal it and stop — next Space plays the response
    if (steps[visibleSteps] && steps[visibleSteps].type === 'user') {
      visibleSteps++; await appendStep(); return;
    }
    playing = true; updateButtons();
    while (playing && visibleSteps < steps.length) {
      // Stop BEFORE the next user message
      if (steps[visibleSteps].type === 'user') break;
      const cur = steps[visibleSteps - 1] || null;
      const nxt = steps[visibleSteps] || null;
      const d = stepDelay(cur, nxt);
      if (d > 0) {
        await new Promise(r => { playTimer = setTimeout(r, d); });
        if (!playing) return;
      }
      visibleSteps++;
      await appendStep();
      if (!playing) return;
    }
    stopPlay();
  }
  function togglePlay() { playing ? stopPlay() : startPlay(); }
  async function startPlay() {
    if (visibleSteps >= steps.length) return;
    playing = true; updateButtons();
    while (playing && visibleSteps < steps.length) {
      const cur = steps[visibleSteps - 1] || null;
      const nxt = steps[visibleSteps] || null;
      const d = stepDelay(cur, nxt);
      if (d > 0) {
        await new Promise(r => { playTimer = setTimeout(r, d); });
        if (!playing) return;
      }
      visibleSteps++;
      await appendStep();
      if (!playing) return;
    }
    stopPlay();
  }
  function stopPlay() {
    playing = false;
    if (playTimer) { clearTimeout(playTimer); clearInterval(playTimer); }
    playTimer = null;
    updateButtons();
  }

  // ── Theme ──────────────────────────────────────────────────────────────────
  function applyTheme(theme) {
    document.body.classList.toggle('light', theme === 'light');
    $('btn-theme').textContent = theme === 'light' ? '☀' : '☾';
    try { localStorage.setItem('chat-replay-theme', theme); } catch {}
  }
  function initTheme() {
    const params = new URLSearchParams(location.search);
    let theme = params.get('theme');
    if (!theme) { try { theme = localStorage.getItem('chat-replay-theme'); } catch {} }
    applyTheme(theme === 'light' ? 'light' : 'dark');
  }

  // ── Drag & drop ────────────────────────────────────────────────────────────
  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try { setTranscript(JSON.parse(reader.result)); }
      catch (e) { alert('Could not parse transcript JSON: ' + e.message); }
    };
    reader.readAsText(file);
  }
  ['dragenter','dragover'].forEach(evt =>
    document.addEventListener(evt, e => { e.preventDefault(); if (dropZone) dropZone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(evt =>
    document.addEventListener(evt, e => { e.preventDefault(); if (dropZone) dropZone.classList.remove('dragover'); }));
  document.addEventListener('drop', e => { const f = e.dataTransfer?.files?.[0]; if (f) handleFile(f); });

  // ── Wire up ────────────────────────────────────────────────────────────────
  $('btn-prev').onclick = prev;
  $('btn-next').onclick = next;
  $('btn-reset').onclick = reset;
  $('btn-end').onclick = revealAll;
  $('btn-play').onclick = togglePlay;
  $('btn-theme').onclick = () =>
    applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');

  // ── Speed controls (injected) ─────────────────────────────────────────
  (function injectSpeedControls() {
    const rightControls = document.querySelector('footer .controls:last-child');
    if (!rightControls) return;
    const wrap = document.createElement('span');
    wrap.className = 'speed-controls';
    const speeds = [
      { v: 1, label: '1×' },
      { v: 2, label: '2×' },
      { v: 4, label: '4×' },
      { v: 0, label: '⚡' },
    ];
    for (const s of speeds) {
      const b = document.createElement('button');
      b.className = 'speed-btn';
      b.dataset.speed = String(s.v);
      b.textContent = s.label;
      b.title = s.v === 0 ? 'Instant (no animation)' : `Playback speed ${s.label}`;
      if (s.v === SPEED) b.classList.add('active');
      b.onclick = () => {
        SPEED = s.v;
        wrap.querySelectorAll('.speed-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      };
      wrap.appendChild(b);
    }
    rightControls.insertBefore(wrap, rightControls.firstChild);
  })();

  $('progress').onclick = e => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    visibleSteps = Math.max(0, Math.min(steps.length, Math.round(pct * steps.length)));
    fullRender();
  };

  // ── Load embedded transcript ──────────────────────────────────────────────
  function tryLoadEmbedded() {
    const raw = $('transcript-data').textContent.trim();
    // Sentinel is concatenated at runtime so naive string-replace of the
    // line-415 placeholder doesn't also clobber this guard.
    const SENTINEL = '__TRANSCRIPT' + '_JSON__';
    if (raw === '"' + SENTINEL + '"' || raw === SENTINEL) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }
  async function tryLoadFromUrl() {
    const params = new URLSearchParams(location.search);
    const src = params.get('src');
    if (!src) return null;
    try { return await (await fetch(src)).json(); } catch { return null; }
  }

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ') { e.preventDefault(); if (playing) { stopPlay(); } else { playUntilNextUser(); } }  // Space: play next side, or pause if mid-play
    else if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
    else if (e.key === 'Home') { e.preventDefault(); reset(); }
    else if (e.key === 'End') { e.preventDefault(); revealAll(); }
    else if (e.key.toLowerCase() === 'p') { e.preventDefault(); togglePlay(); }
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  initTheme();
  (async function boot() {
    let t = tryLoadEmbedded();
    if (!t) t = await tryLoadFromUrl();
    if (t) setTranscript(t);
    else fullRender();
  })();
})();
</script>

</body>
</html>
