<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Replay</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1f2937;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --user: #58a6ff;
    --assistant: #3fb950;
    --tool: #d29922;
    --tool-bg: rgba(210, 153, 34, 0.08);
    --code-bg: #010409;
    --kw: #ff7b72;
    --str: #a5d6ff;
    --num: #79c0ff;
    --com: #8b949e;
    --fn: #d2a8ff;
  }
  body.light {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --surface-2: #eaeef2;
    --border: #d0d7de;
    --text: #1f2328;
    --text-muted: #59636e;
    --user: #0969da;
    --assistant: #1a7f37;
    --tool: #9a6700;
    --tool-bg: rgba(154, 103, 0, 0.06);
    --code-bg: #f6f8fa;
    --kw: #cf222e;
    --str: #0a3069;
    --num: #0550ae;
    --com: #6e7781;
    --fn: #8250df;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header .title {
    font-size: 18px;
    font-weight: 600;
  }
  header .agent {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 2px;
  }
  header .meta-right {
    color: var(--text-muted);
    font-size: 13px;
    text-align: right;
  }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    scroll-behavior: smooth;
  }
  .chat {
    max-width: 980px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .turn {
    animation: appear 240ms ease-out;
  }
  @keyframes appear {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .turn.user {
    display: flex;
    justify-content: flex-end;
  }
  .turn.user .bubble {
    background: var(--user);
    color: white;
    padding: 14px 20px;
    border-radius: 18px 18px 4px 18px;
    max-width: 75%;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  body.light .turn.user .bubble { color: white; }
  .turn.assistant {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .role-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .text-block {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    border-radius: 4px 18px 18px 18px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .text-block:not(:first-child) {
    border-radius: 18px;
  }
  .text-block strong { color: var(--text); }
  .text-block code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.92em;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
  }
  .tool-card {
    background: var(--tool-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--tool);
    border-radius: 8px;
    overflow: hidden;
  }
  .tool-card.result {
    border-left-color: var(--assistant);
    background: var(--surface);
    margin-left: 24px;
    margin-top: -6px;
  }
  .tool-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
  }
  .tool-header:hover { background: rgba(255,255,255,0.03); }
  body.light .tool-header:hover { background: rgba(0,0,0,0.03); }
  .tool-icon {
    font-size: 14px;
    color: var(--tool);
  }
  .tool-card.result .tool-icon { color: var(--assistant); }
  .tool-name {
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-weight: 600;
    color: var(--text);
  }
  .tool-label {
    color: var(--text-muted);
    font-size: 12px;
    margin-left: auto;
  }
  .tool-toggle {
    color: var(--text-muted);
    font-size: 11px;
    transition: transform 200ms;
  }
  .tool-card.collapsed .tool-toggle { transform: rotate(-90deg); }
  .tool-body {
    padding: 0 16px 14px 16px;
    max-height: 600px;
    overflow-y: auto;
  }
  .tool-card.collapsed .tool-body { display: none; }
  .tool-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 0;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-size: 13.5px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre;
    color: var(--text);
  }
  .tool-body .field-label {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    margin: 8px 0 4px 0;
    text-transform: lowercase;
  }
  .tool-body .field-label:first-child { margin-top: 4px; }
  .result-text {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
    font-size: 13.5px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: 12px 14px;
    border-radius: 6px;
  }
  /* Syntax highlighting */
  .tok-kw { color: var(--kw); font-weight: 600; }
  .tok-str { color: var(--str); }
  .tok-num { color: var(--num); }
  .tok-com { color: var(--com); font-style: italic; }
  .tok-fn { color: var(--fn); }
  /* Footer controls */
  footer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  button {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 120ms;
  }
  button:hover { background: var(--border); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: var(--user);
    color: white;
    border-color: var(--user);
  }
  .counter {
    color: var(--text-muted);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    min-width: 80px;
    text-align: center;
  }
  .progress {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    max-width: 300px;
    cursor: pointer;
  }
  .progress-bar {
    height: 100%;
    background: var(--user);
    transition: width 200ms;
  }
  .hint {
    color: var(--text-muted);
    font-size: 12px;
  }
  .empty {
    color: var(--text-muted);
    text-align: center;
    margin-top: 80px;
    font-size: 15px;
  }
  .empty .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 60px 40px;
    margin-top: 24px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }
  .empty .drop-zone.dragover {
    border-color: var(--user);
    background: var(--surface);
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="title" id="title">Chat Replay</div>
    <div class="agent" id="agent"></div>
  </div>
  <div class="meta-right" id="meta-right"></div>
</header>

<main id="main">
  <div class="chat" id="chat"></div>
  <div class="empty" id="empty" style="display:none;">
    <div>No transcript loaded.</div>
    <div class="drop-zone" id="drop-zone">
      Drop a transcript JSON file here<br>
      <span class="hint">or use ?src=path.json in the URL</span>
    </div>
  </div>
</main>

<footer>
  <div class="controls">
    <button id="btn-reset" title="Reset (Home)">⏮</button>
    <button id="btn-prev" title="Previous (←)">←</button>
    <button id="btn-play" class="primary" title="Auto-play (P)">▶ Play</button>
    <button id="btn-next" title="Next (Space / →)">→</button>
    <button id="btn-end" title="Reveal all (End)">⏭</button>
  </div>
  <div class="counter" id="counter">0 / 0</div>
  <div class="progress" id="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  <div class="controls">
    <button id="btn-theme" title="Toggle theme">☾</button>
    <span class="hint">Space ▸ next · P ▸ play</span>
  </div>
</footer>

<script type="application/json" id="transcript-data">{"meta":{"title":"BC Telemetry Buddy — slow page investigation","agent":"BC Telemetry Buddy","model":"gpt-4o","source":"copilot-studio"},"turns":[{"role":"user","content":"Why is the Sales Order list so slow for Contoso since last Tuesday?"},{"role":"assistant","blocks":[{"type":"text","content":"Let me check Application Insights for that environment over the last week."},{"type":"tool_use","id":"call_01","name":"query_app_insights","input":{"kql":"traces\n| where customDimensions.environmentName == 'CONTOSO-PROD'\n| where customDimensions.eventId == 'RT0005'\n| where timestamp > ago(7d)\n| where customDimensions.alObjectId == 9305\n| summarize avg_ms = avg(toreal(customDimensions.serverExecutionTime)),\n            p95_ms = percentile(toreal(customDimensions.serverExecutionTime), 95),\n            count() by bin(timestamp, 1h)\n| order by timestamp asc","timespan":"P7D"}}]},{"role":"tool","toolUseId":"call_01","name":"query_app_insights","content":[{"type":"text","content":"Returned 168 rows.\n\nBaseline (Mon-Tue early): avg ~140ms, p95 ~380ms, ~45 calls/hr.\nFrom Tuesday 14:00 onward: avg jumped to ~2,800ms, p95 ~7,200ms, same call volume.\n\nNo errors. Just slow."}]},{"role":"assistant","blocks":[{"type":"text","content":"Big jump at a specific time — that smells like a deployment or a data shape change. Let me check what was deployed around then and what the SQL is doing now."},{"type":"tool_use","id":"call_02","name":"query_app_insights","input":{"kql":"traces\n| where customDimensions.environmentName == 'CONTOSO-PROD'\n| where customDimensions.eventId == 'AL0000E26'\n| where timestamp between (datetime('2026-04-07 12:00') .. datetime('2026-04-07 16:00'))\n| project timestamp, customDimensions.extensionName, customDimensions.extensionVersion"}}]},{"role":"tool","toolUseId":"call_02","name":"query_app_insights","content":[{"type":"text","content":"1 row.\n\n2026-04-07 13:52  Contoso Sales Customizations  v2.4.1 → v2.5.0"}]},{"role":"assistant","blocks":[{"type":"text","content":"Confirmed — Contoso Sales Customizations was upgraded to v2.5.0 about 8 minutes before the slowdown started. Let me look at the long-running SQL statements on that page now."},{"type":"tool_use","id":"call_03","name":"query_app_insights","input":{"kql":"traces\n| where customDimensions.environmentName == 'CONTOSO-PROD'\n| where customDimensions.eventId == 'RT0005'\n| where customDimensions.alObjectId == 9305\n| where timestamp > ago(2d)\n| join kind=inner (\n    traces\n    | where customDimensions.eventId == 'RT0008'\n    | project operation_Id, sqlStatement = customDimensions.sqlStatement,\n              sql_ms = toreal(customDimensions.executionTimeInMS)\n) on operation_Id\n| top 5 by sql_ms desc\n| project sqlStatement, sql_ms"}}]},{"role":"tool","toolUseId":"call_03","name":"query_app_insights","content":[{"type":"text","content":"Top statement (5 of 5 hits): 6,400ms\n\nSELECT TOP(50) * FROM [CRONUS$Sales Header$...] WHERE [Document Type]=@0 AND [Custom Region Code]=@1 ORDER BY [Posting Date] DESC\n\nNo matching key on (Document Type, Custom Region Code, Posting Date). Falls back to clustered scan."}]},{"role":"assistant","blocks":[{"type":"text","content":"Found it.\n\n**Root cause:** v2.5.0 of Contoso Sales Customizations added a `Custom Region Code` filter to the Sales Order List, but no SecondaryKey was added to `Sales Header` for the new field. Every list refresh now scans the table.\n\n**Fix:** Add a key `(Document Type, Custom Region Code, Posting Date)` to the `Sales Header` extension table in v2.5.1.\n\n**Workaround until then:** users can clear the Custom Region filter on the page; performance returns to baseline immediately.\n\nWant me to draft the AL change?"}]}]}</script>

<script>
(function() {
  // ---------- State ----------
  let transcript = null;
  let visibleTurns = 0;
  let playing = false;
  let playTimer = null;
  const PLAY_DELAY_MS = 1800;

  const $ = id => document.getElementById(id);
  const chatEl = $('chat');
  const emptyEl = $('empty');
  const titleEl = $('title');
  const agentEl = $('agent');
  const metaRightEl = $('meta-right');
  const counterEl = $('counter');
  const progressBar = $('progress-bar');
  const dropZone = $('drop-zone');

  // ---------- Load transcript ----------
  function tryLoadEmbedded() {
    const raw = $('transcript-data').textContent.trim();
    if (raw === '"__TRANSCRIPT_JSON__"' || raw === '__TRANSCRIPT_JSON__') return null;
    try {
      // The build script writes the object directly; the placeholder is a string
      return JSON.parse(raw);
    } catch (e) {
      console.warn('Embedded transcript failed to parse:', e);
      return null;
    }
  }

  async function tryLoadFromUrl() {
    const params = new URLSearchParams(location.search);
    const src = params.get('src');
    if (!src) return null;
    try {
      const r = await fetch(src);
      return await r.json();
    } catch (e) {
      console.warn('Could not fetch transcript from src:', e);
      return null;
    }
  }

  function setTranscript(t) {
    transcript = t;
    visibleTurns = t && t.turns && t.turns.length > 0 ? 1 : 0;
    renderHeader();
    render();
  }

  // ---------- Rendering ----------
  function renderHeader() {
    if (!transcript) return;
    const m = transcript.meta || {};
    titleEl.textContent = m.title || 'Chat Replay';
    document.title = m.title || 'Chat Replay';
    agentEl.textContent = m.agent || '';
    const right = [];
    if (m.model) right.push(m.model);
    if (m.source) right.push(m.source);
    metaRightEl.textContent = right.join(' · ');
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // Tiny KQL/SQL/JSON highlighter
  function highlight(code, lang) {
    let s = escapeHtml(code);
    if (lang === 'json') {
      s = s.replace(/("(?:[^"\\]|\\.)*")(\s*:)?/g, (_, str, colon) =>
        colon ? `<span class="tok-fn">${str}</span>${colon}` : `<span class="tok-str">${str}</span>`)
        .replace(/\b(true|false|null)\b/g, '<span class="tok-kw">$1</span>')
        .replace(/(?<![\w-])(-?\d+(?:\.\d+)?)/g, '<span class="tok-num">$1</span>');
      return s;
    }
    // KQL / SQL
    const kw = ['select','from','where','and','or','not','order','by','asc','desc','top','distinct','group','having','join','inner','left','right','full','outer','on','as','case','when','then','else','end','union','project','extend','summarize','count','sum','avg','min','max','let','union','take','limit','make-list','make-set','bin','ago','datetime','between','startswith','endswith','contains','in'];
    s = s
      .replace(/(--[^\n]*|\/\/[^\n]*)/g, '<span class="tok-com">$1</span>')
      .replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*")/g, '<span class="tok-str">$1</span>')
      .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-num">$1</span>');
    const kwRe = new RegExp('\\b(' + kw.join('|') + ')\\b', 'gi');
    s = s.replace(kwRe, '<span class="tok-kw">$1</span>');
    return s;
  }

  function detectLang(key, value) {
    const k = (key || '').toLowerCase();
    if (k === 'kql' || k === 'sql' || k === 'query') return k === 'kql' ? 'kql' : 'sql';
    if (k === 'code') return 'sql';
    if (typeof value === 'object') return 'json';
    return null;
  }

  function renderToolInput(input) {
    if (!input || typeof input !== 'object') {
      return `<pre>${escapeHtml(String(input))}</pre>`;
    }
    const keys = Object.keys(input);
    // If single key is a query/code field, render just that highlighted
    if (keys.length === 1) {
      const k = keys[0];
      const v = input[k];
      const lang = detectLang(k, v);
      if (lang && typeof v === 'string') {
        return `<div class="field-label">${escapeHtml(k)}</div><pre>${highlight(v, lang)}</pre>`;
      }
    }
    // Multi-field: render each, highlighting query fields
    let html = '';
    for (const k of keys) {
      const v = input[k];
      const lang = detectLang(k, v);
      html += `<div class="field-label">${escapeHtml(k)}</div>`;
      if (lang && typeof v === 'string') {
        html += `<pre>${highlight(v, lang)}</pre>`;
      } else if (typeof v === 'object') {
        html += `<pre>${highlight(JSON.stringify(v, null, 2), 'json')}</pre>`;
      } else {
        html += `<pre>${escapeHtml(String(v))}</pre>`;
      }
    }
    return html;
  }

  function shouldStartCollapsed(input) {
    const json = JSON.stringify(input || {}, null, 2);
    return json.split('\n').length > 8;
  }

  function renderTurn(turn, idx) {
    const div = document.createElement('div');
    div.className = 'turn ' + turn.role;

    if (turn.role === 'user') {
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = turn.content || '';
      div.appendChild(b);
      return div;
    }

    if (turn.role === 'assistant') {
      const label = document.createElement('div');
      label.className = 'role-label';
      label.textContent = transcript.meta?.agent || 'Assistant';
      div.appendChild(label);

      for (const block of (turn.blocks || [])) {
        if (block.type === 'text') {
          const t = document.createElement('div');
          t.className = 'text-block';
          t.textContent = block.content || '';
          div.appendChild(t);
        } else if (block.type === 'tool_use') {
          const card = document.createElement('div');
          card.className = 'tool-card';
          if (shouldStartCollapsed(block.input)) card.classList.add('collapsed');
          const collapsed = card.classList.contains('collapsed');
          card.innerHTML = `
            <div class="tool-header">
              <span class="tool-icon">🔧</span>
              <span class="tool-name">${escapeHtml(block.name || 'tool')}</span>
              <span class="tool-label">tool call</span>
              <span class="tool-toggle">▼</span>
            </div>
            <div class="tool-body">${renderToolInput(block.input)}</div>
          `;
          card.querySelector('.tool-header').addEventListener('click', () => {
            card.classList.toggle('collapsed');
          });
          div.appendChild(card);
        }
      }
      return div;
    }

    if (turn.role === 'tool') {
      const card = document.createElement('div');
      card.className = 'tool-card result';
      const content = (turn.content || []).map(c =>
        c.type === 'text' ? `<div class="result-text">${escapeHtml(c.content || '')}</div>` : ''
      ).join('');
      card.innerHTML = `
        <div class="tool-header">
          <span class="tool-icon">↳</span>
          <span class="tool-name">${escapeHtml(turn.name || 'result')}</span>
          <span class="tool-label">result</span>
          <span class="tool-toggle">▼</span>
        </div>
        <div class="tool-body">${content}</div>
      `;
      card.querySelector('.tool-header').addEventListener('click', () => {
        card.classList.toggle('collapsed');
      });
      return card;
    }

    return div;
  }

  function render() {
    if (!transcript || !transcript.turns) {
      emptyEl.style.display = 'block';
      chatEl.innerHTML = '';
      counterEl.textContent = '0 / 0';
      progressBar.style.width = '0%';
      return;
    }
    emptyEl.style.display = 'none';
    chatEl.innerHTML = '';
    const turns = transcript.turns.slice(0, visibleTurns);
    for (let i = 0; i < turns.length; i++) {
      chatEl.appendChild(renderTurn(turns[i], i));
    }
    counterEl.textContent = `${visibleTurns} / ${transcript.turns.length}`;
    progressBar.style.width = `${(visibleTurns / transcript.turns.length) * 100}%`;
    // Scroll latest into view
    requestAnimationFrame(() => {
      const last = chatEl.lastElementChild;
      if (last) last.scrollIntoView({ behavior: 'smooth', block: 'end' });
    });
    updateButtons();
  }

  function updateButtons() {
    if (!transcript) return;
    $('btn-prev').disabled = visibleTurns <= 0;
    $('btn-next').disabled = visibleTurns >= transcript.turns.length;
    $('btn-reset').disabled = visibleTurns === 0;
    $('btn-end').disabled = visibleTurns >= transcript.turns.length;
    $('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
  }

  // ---------- Navigation ----------
  function next() {
    if (!transcript) return;
    if (visibleTurns < transcript.turns.length) {
      visibleTurns++;
      render();
    } else {
      stopPlay();
    }
  }
  function prev() {
    if (visibleTurns > 0) { visibleTurns--; render(); }
  }
  function reset() { visibleTurns = transcript ? Math.min(1, transcript.turns.length) : 0; render(); }
  function revealAll() {
    if (!transcript) return;
    visibleTurns = transcript.turns.length;
    render();
  }
  function togglePlay() {
    if (playing) stopPlay();
    else startPlay();
  }
  function startPlay() {
    if (!transcript || visibleTurns >= transcript.turns.length) return;
    playing = true;
    updateButtons();
    playTimer = setInterval(() => {
      next();
      if (visibleTurns >= transcript.turns.length) stopPlay();
    }, PLAY_DELAY_MS);
  }
  function stopPlay() {
    playing = false;
    if (playTimer) clearInterval(playTimer);
    playTimer = null;
    updateButtons();
  }

  // ---------- Theme ----------
  function applyTheme(theme) {
    document.body.classList.toggle('light', theme === 'light');
    $('btn-theme').textContent = theme === 'light' ? '☀' : '☾';
    try { localStorage.setItem('chat-replay-theme', theme); } catch {}
  }
  function initTheme() {
    const params = new URLSearchParams(location.search);
    let theme = params.get('theme');
    if (!theme) { try { theme = localStorage.getItem('chat-replay-theme'); } catch {} }
    applyTheme(theme === 'light' ? 'light' : 'dark');
  }

  // ---------- Drag & drop ----------
  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        setTranscript(data);
      } catch (e) {
        alert('Could not parse transcript JSON: ' + e.message);
      }
    };
    reader.readAsText(file);
  }
  ['dragenter', 'dragover'].forEach(evt =>
    document.addEventListener(evt, e => {
      e.preventDefault();
      if (dropZone) dropZone.classList.add('dragover');
    })
  );
  ['dragleave', 'drop'].forEach(evt =>
    document.addEventListener(evt, e => {
      e.preventDefault();
      if (dropZone) dropZone.classList.remove('dragover');
    })
  );
  document.addEventListener('drop', e => {
    const file = e.dataTransfer?.files?.[0];
    if (file) handleFile(file);
  });

  // ---------- Wire up ----------
  $('btn-prev').onclick = prev;
  $('btn-next').onclick = next;
  $('btn-reset').onclick = reset;
  $('btn-end').onclick = revealAll;
  $('btn-play').onclick = togglePlay;
  $('btn-theme').onclick = () =>
    applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
  $('progress').onclick = e => {
    if (!transcript) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    visibleTurns = Math.max(0, Math.min(transcript.turns.length, Math.round(pct * transcript.turns.length)));
    render();
  };

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
    else if (e.key === 'Home') { e.preventDefault(); reset(); }
    else if (e.key === 'End') { e.preventDefault(); revealAll(); }
    else if (e.key.toLowerCase() === 'p') { e.preventDefault(); togglePlay(); }
  });

  // ---------- Boot ----------
  initTheme();
  (async function boot() {
    let t = tryLoadEmbedded();
    if (!t) t = await tryLoadFromUrl();
    if (t) setTranscript(t);
    else render(); // shows empty state
  })();
})();
</script>

</body>
</html>
